site_name: wardcat
site_description: PII detection and anonymization for LLM inputs — hybrid regex + NER + GLiNER + on-prem LLM.
repo_url: https://github.com/oguzhantopcu0/wardcat
repo_name: oguzhantopcu0/wardcat
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    # Dark neon is the default; a light toggle is still available.
    - scheme: slate
      primary: black
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [.]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Guide:
      - Detection layers: guide/layers.md
      - Configuration & policy: guide/configuration.md
      - Extending: guide/extending.md
      - Security: guide/security.md
  - API reference:
      - Wardcat: reference/aiguard.md
      - Results & constants: reference/models.md
      - Detectors & backends: reference/internals.md
  - Changelog: changelog.md
