name: Real-model tests (manual)

# Model-based backends are mock-only in the normal suite. This job installs the
# heavy extras and runs the `slow` tests against real models — catching bugs
# (like a wrong pipeline kwarg) that mocks cannot see. Run it on demand from the
# Actions tab (or locally: `uv run --extra transformers pytest -m slow`). No
# schedule, so it never runs on its own and the fast PR CI stays fast.
on:
  workflow_dispatch:

jobs:
  slow-tests:
    name: Real-model slow tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install with the transformers extra
        run: uv sync --extra transformers --dev

      - name: Run slow tests (real models; auto-skip what's unavailable)
        run: uv run pytest -m slow tests/integration/ --tb=short -q
